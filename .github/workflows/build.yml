name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew -o gradlew
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew.bat -o gradlew.bat
            mkdir -p gradle/wrapper
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
          fi

      - name: Generate launcher icons from root PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

          declare -A sizes=(
            ["mdpi"]=48
            ["hdpi"]=72
            ["xhdpi"]=96
            ["xxhdpi"]=144
            ["xxxhdpi"]=192
          )

          for density in "${!sizes[@]}"; do
            size=${sizes[$density]}
            mkdir -p app/src/main/res/mipmap-$density
            convert icon_torpor.png -resize ${size}x${size} app/src/main/res/mipmap-$density/ic_launcher.png
            convert icon_torpor.png -resize ${size}x${size} app/src/main/res/mipmap-$density/ic_launcher_round.png
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: torpor-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
